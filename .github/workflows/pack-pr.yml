name: Pack PR Translation Bundle

on:
  pull_request:
    paths:
      - 'projects/assets/**'
      - 'config/packer/**'
      - 'src/Packer/**'
      - 'tests/Packer.Tests/**'
      - 'VintageStory-Chinese-Language-Package.sln'
      - '.github/workflows/pack-pr.yml'

permissions:
  contents: read

jobs:
  pack:
    name: Build zip for PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Generate timestamp version
        id: version
        run: |
          echo "value=$(date -u +'%Y.%-m.%-d-pr%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: dotnet test

      - name: Build pack
        run: dotnet run --project src/Packer -- pack --config config/packer/default.json --package-version "${{ steps.version.outputs.value }}"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: vscn-language-pack-pr-${{ steps.version.outputs.value }}
          path: build/VSCN-VintageStory-Chinese-Language-Pack-${{ steps.version.outputs.value }}.zip
          if-no-files-found: error
